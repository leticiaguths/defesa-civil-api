<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defesa Civil — Sistema de Alerta</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  /* HUD superior */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 32px;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
  }

  #logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #logo .shield {
    width: 28px; height: 28px;
    background: #e63946;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  #status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.5s ease;
    background: rgba(255,255,255,0.08);
    color: #aaa;
    border: 1px solid rgba(255,255,255,0.1);
  }

  #status-badge.normal { background: rgba(34,197,94,0.15); color: #22c55e; border-color: rgba(34,197,94,0.3); }
  #status-badge.alert  { background: rgba(230,57,70,0.2);  color: #e63946; border-color: rgba(230,57,70,0.5); animation: pulse-badge 1s infinite; }

  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.4); }
    50%       { box-shadow: 0 0 0 8px rgba(230,57,70,0); }
  }

  #dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
  }

  /* Painel de alerta */
  #alert-panel {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    z-index: 10;
    background: linear-gradient(135deg, #1a0a0a, #2d0f0f);
    border: 1px solid rgba(230,57,70,0.4);
    border-radius: 16px;
    padding: 20px 32px;
    text-align: center;
    min-width: 380px;
    box-shadow: 0 0 40px rgba(230,57,70,0.2), 0 20px 60px rgba(0,0,0,0.5);
    transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  #alert-panel.visible {
    transform: translateX(-50%) translateY(0);
  }

  #alert-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: #e63946;
    margin-bottom: 4px;
  }

  #alert-temp {
    font-size: 48px;
    font-weight: 300;
    color: #fff;
    line-height: 1;
    margin: 8px 0;
  }

  #alert-temp span { font-size: 20px; color: #aaa; }

  #alert-msg {
    font-size: 12px;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Ações ativadas */
  #actions {
    position: fixed;
    right: 28px; top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .action-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 200px;
    opacity: 0.3;
    transition: all 0.5s ease;
  }

  .action-card.active {
    opacity: 1;
    background: rgba(34,197,94,0.08);
    border-color: rgba(34,197,94,0.3);
  }

  .action-icon {
    font-size: 22px;
    width: 38px; height: 38px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.5s;
  }

  .action-card.active .action-icon {
    background: rgba(34,197,94,0.15);
  }

  .action-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .action-value { font-size: 14px; color: #fff; font-weight: 600; margin-top: 2px; }
  .action-card.active .action-label { color: #22c55e; }

  /* Overlay de alerta vermelho */
  #alert-overlay {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(230,57,70,0.15) 100%);
    opacity: 0;
    transition: opacity 1s ease;
  }
  #alert-overlay.visible { opacity: 1; }

  /* Temperatura no canto */
  #temp-display {
    position: fixed;
    left: 28px; top: 50%;
    transform: translateY(-50%);
    z-index: 10;
  }

  #temp-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 1;
    color: #fff;
    transition: color 0.5s;
  }
  #temp-big.hot { color: #e63946; }
  #temp-unit { font-size: 28px; color: #555; }
  #temp-label { font-size: 11px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  /* Botão de simulação (para apresentação) */
  #sim-btn {
    position: fixed;
    bottom: 32px; right: 28px;
    z-index: 20;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #888;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #sim-btn:hover { background: rgba(230,57,70,0.15); border-color: rgba(230,57,70,0.4); color: #e63946; }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>
<div id="alert-overlay"></div>

<!-- HUD -->
<div id="hud">
  <div id="logo">
    <div class="shield">🛡</div>
    DEFESA CIVIL — SISTEMA DE ALERTA
  </div>
  <div id="status-badge">
    <div id="dot"></div>
    <span id="status-text">MONITORANDO</span>
  </div>
</div>

<!-- Temperatura -->
<div id="temp-display">
  <div id="temp-big">--<span id="temp-unit">°C</span></div>
  <div id="temp-label">Temperatura</div>
  <div id="temp-label" style="font-size:10px;color:#333;margin-top:2px;">Umidade: <span id="umid-val">--%</span></div>
</div>

<!-- Ações -->
<div id="actions">
  <div class="action-card" id="ac-card">
    <div class="action-icon">❄️</div>
    <div>
      <div class="action-label">Ar-condicionado</div>
      <div class="action-value" id="ac-status">Desligado</div>
    </div>
  </div>
  <div class="action-card" id="win-card">
    <div class="action-icon">🪟</div>
    <div>
      <div class="action-label">Janelas / Cortinas</div>
      <div class="action-value" id="win-status">Abertas</div>
    </div>
  </div>

</div>

<!-- Painel de alerta -->
<div id="alert-panel">
  <div id="alert-title">⚠ ALERTA DE CALOR</div>
  <div id="alert-temp">--<span>°C</span></div>
  <div id="alert-msg">Feche janelas e ligue o ar-condicionado</div>
</div>

<!-- Botão de simulação manual -->
<button id="sim-btn" onclick="triggerAlert(42.5, 85)">▶ SIMULAR ALERTA</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===================== THREE.JS SCENE =====================
const container = document.getElementById('canvas-container');
const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // céu azul
scene.fog = new THREE.FogExp2(0xffeedd, 0.018);

const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
camera.position.set(0, 2.2, 7.5);
camera.lookAt(0, 2.0, 0);

// ===================== LUZES =====================
const ambientLight = new THREE.AmbientLight(0xfff5e0, 0.6);
scene.add(ambientLight);

// Luz solar pela janela
const sunLight = new THREE.DirectionalLight(0xfff0c0, 1.0);
sunLight.position.set(2, 6, 4);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 30;
sunLight.shadow.camera.left = -10;
sunLight.shadow.camera.right = 10;
sunLight.shadow.camera.top = 10;
sunLight.shadow.camera.bottom = -10;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

// Luz quente da luminária
const lampLight = new THREE.PointLight(0xff9944, 1.2, 8);
lampLight.position.set(-3.5, 3.2, 1.5);
lampLight.castShadow = true;
scene.add(lampLight);

// Luz da TV (azulada)
const tvLight = new THREE.PointLight(0x4488ff, 0.3, 4);
tvLight.position.set(0, 2.5, -4.2);
scene.add(tvLight);

// Luz do AC (começa apagada, azul frio)
const acLight = new THREE.PointLight(0x88ddff, 0, 6);
acLight.position.set(0, 4.5, -3.8);
scene.add(acLight);

// ===================== HELPERS =====================
function box(w, h, d, color, x, y, z, rx=0, ry=0, rz=0) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.rotation.set(rx, ry, rz);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// ===================== SALA =====================
// Chão — madeira clara
const floorGeo = new THREE.PlaneGeometry(14, 12);
const floorMat = new THREE.MeshLambertMaterial({ color: 0xc8a96e });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Tapete bege/creme centralizado
const rugGeo = new THREE.PlaneGeometry(5.5, 3.2);
const rugMat = new THREE.MeshLambertMaterial({ color: 0xd4b896 });
const rug = new THREE.Mesh(rugGeo, rugMat);
rug.rotation.x = -Math.PI / 2;
rug.position.set(0, 0.01, 1.8);
scene.add(rug);
// Borda do tapete
const rugBorderGeo = new THREE.PlaneGeometry(5.9, 3.6);
const rugBorderMat = new THREE.MeshLambertMaterial({ color: 0xa07850 });
const rugBorder = new THREE.Mesh(rugBorderGeo, rugBorderMat);
rugBorder.rotation.x = -Math.PI / 2;
rugBorder.position.set(0, 0.005, 1.8);
scene.add(rugBorder);

// Parede de fundo — branco cremoso
const wallBack = box(14, 8, 0.2, 0xf5f0e8, 0, 4, -5.0);
// Paredes laterais
box(0.2, 8, 12, 0xede8e0, -7, 4, 0);
box(0.2, 8, 12, 0xede8e0,  7, 4, 0);
// Teto branco
box(14, 0.2, 12, 0xfafaf8, 0, 8, 0);
// Faixa decorativa na parede (moldura)
box(14, 0.08, 0.1, 0xd4c9b0, 0, 5.8, -4.89);
// Rodapé branco
box(14, 0.12, 0.12, 0xe8e0d0, 0, 0.06, -4.89);
box(0.12, 0.12, 12, 0xe8e0d0, -6.89, 0.06, 0);
box(0.12, 0.12, 12, 0xe8e0d0,  6.89, 0.06, 0);

// ===================== JANELA GRANDE =====================
// Céu fora da janela
box(4.5, 3.2, 0.05, 0x87CEEB, -2.5, 3.2, -4.88);
// Sol
box(0.5, 0.5, 0.05, 0xFFFF80, -4.0, 4.5, -4.87);
// Nuvem
box(0.8, 0.3, 0.05, 0xffffff, -2.8, 4.8, -4.87);
box(0.5, 0.3, 0.05, 0xffffff, -3.2, 4.9, -4.87);
// Árvore simplificada
box(0.15, 1.2, 0.05, 0x6b4a1e, -1.2, 2.0, -4.87);
box(0.9, 1.2, 0.05, 0x2d7a2d, -1.2, 3.2, -4.87);

// Moldura branca da janela
box(4.7, 0.1, 0.2, 0xffffff, -2.5, 4.85, -4.82); // topo
box(4.7, 0.1, 0.2, 0xffffff, -2.5, 1.55, -4.82); // base
box(0.1, 3.4, 0.2, 0xffffff, -4.85, 3.2, -4.82); // esq
box(0.1, 3.4, 0.2, 0xffffff, -0.15, 3.2, -4.82); // dir
// Divisor central janela
box(0.07, 3.2, 0.15, 0xffffff, -2.5, 3.2, -4.80);
box(4.5, 0.07, 0.15, 0xffffff, -2.5, 3.2, -4.80);
// Peitoril
box(4.9, 0.12, 0.35, 0xf0ece4, -2.5, 1.49, -4.72);

// Varão das cortinas
box(5.2, 0.07, 0.07, 0xc8a060, -2.5, 5.1, -4.65);
// Ponteiras do varão
box(0.12, 0.12, 0.12, 0xc8a060, -5.1, 5.1, -4.65);
box(0.12, 0.12, 0.12, 0xc8a060,  0.1, 5.1, -4.65);

// ===================== CORTINAS =====================
const curtainMatL = new THREE.MeshLambertMaterial({ color: 0xe8d5b0, side: THREE.DoubleSide });
const curtainMatR = new THREE.MeshLambertMaterial({ color: 0xe8d5b0, side: THREE.DoubleSide });

const curtainGeoL = new THREE.BoxGeometry(0.6, 3.5, 0.05);
const curtainL = new THREE.Mesh(curtainGeoL, curtainMatL);
curtainL.position.set(-4.7, 3.3, -4.7);
curtainL.castShadow = true;
scene.add(curtainL);

const curtainGeoR = new THREE.BoxGeometry(0.6, 3.5, 0.05);
const curtainR = new THREE.Mesh(curtainGeoR, curtainMatR);
curtainR.position.set(-0.3, 3.3, -4.7);
curtainR.castShadow = true;
scene.add(curtainR);

// ===================== TV E RACK =====================
// Rack de TV — madeira escura
box(4.0, 0.5, 0.55, 0x5c3d1e, 2.8, 0.25, -4.6);
box(4.2, 0.06, 0.6, 0x4a3010, 2.8, 0.52, -4.6); // tampo
// Portas do rack
box(1.7, 0.38, 0.04, 0x6b4a2a, 1.95, 0.25, -4.35);
box(1.7, 0.38, 0.04, 0x6b4a2a, 3.65, 0.25, -4.35);
box(0.03, 0.3, 0.03, 0xc8a060, 2.86, 0.25, -4.33); // puxador esq
box(0.03, 0.3, 0.03, 0xc8a060, 4.56, 0.25, -4.33); // puxador dir
// Pernas do rack
box(0.08, 0.12, 0.08, 0x3a2010, 1.0, 0.06, -4.35);
box(0.08, 0.12, 0.08, 0x3a2010, 4.6, 0.06, -4.35);
box(0.08, 0.12, 0.08, 0x3a2010, 1.0, 0.06, -4.82);
box(0.08, 0.12, 0.08, 0x3a2010, 4.6, 0.06, -4.82);

// TV — tela grande
box(3.2, 1.9, 0.08, 0x111111, 2.8, 2.1, -4.85); // moldura
const tvScreenGeo = new THREE.BoxGeometry(3.0, 1.72, 0.05);
const tvScreenMat = new THREE.MeshLambertMaterial({ color: 0x1a2a4a, emissive: 0x0a1525 });
const tvScreen = new THREE.Mesh(tvScreenGeo, tvScreenMat);
tvScreen.position.set(2.8, 2.1, -4.81);
scene.add(tvScreen);
// Logo da TV
box(0.25, 0.08, 0.02, 0x888888, 2.8, 1.22, -4.80);
// Suporte TV
box(0.12, 0.6, 0.12, 0x222222, 2.8, 0.85, -4.78);
box(0.8, 0.05, 0.3, 0x222222, 2.8, 0.55, -4.72);

// ===================== AR-CONDICIONADO =====================
// Corpo principal — branco clean
const acBody = box(2.6, 0.55, 0.4, 0xf5f5f5, 2.8, 5.5, -4.72);
box(2.4, 0.42, 0.05, 0xfafafa, 2.8, 5.5, -4.52); // painel frontal
// Grade
for (let i = -1.0; i <= 1.0; i += 0.2) {
  box(0.025, 0.25, 0.06, 0xdddddd, 2.8 + i, 5.44, -4.50);
}
// Aba defletora
box(2.2, 0.055, 0.16, 0xeeeeee, 2.8, 5.3, -4.51);
// LED
const acLedGeo = new THREE.BoxGeometry(0.1, 0.1, 0.03);
const acLedMat = new THREE.MeshLambertMaterial({ color: 0xff2222, emissive: 0x880000 });
const acLed = new THREE.Mesh(acLedGeo, acLedMat);
acLed.position.set(1.6, 5.55, -4.50);
scene.add(acLed);
box(0.45, 0.15, 0.025, 0x111111, 2.5, 5.55, -4.50); // display

// ===================== SOFÁ =====================
// Sofá cinza moderno
box(4.0, 0.38, 1.3, 0x8a8a8a, 0, 0.19, 2.8); // base
box(4.0, 0.14, 1.1, 0x9a9a9a, 0, 0.46, 2.8); // assento
box(4.0, 0.85, 0.18, 0x7a7a7a, 0, 0.81, 3.38); // encosto
// Braços arredondados
box(0.22, 0.65, 1.3, 0x6e6e6e, -2.11, 0.5, 2.8);
box(0.22, 0.65, 1.3, 0x6e6e6e,  2.11, 0.5, 2.8);
// Almofadas coloridas (terracota e verde)
box(1.4, 0.28, 0.75, 0xc0704a, -0.95, 0.62, 2.85);
box(1.4, 0.28, 0.75, 0x5a8a6a,  0.95, 0.62, 2.85);
// Pernas de metal
box(0.07, 0.14, 0.07, 0x888888, -1.8, 0.07, 2.2);
box(0.07, 0.14, 0.07, 0x888888,  1.8, 0.07, 2.2);
box(0.07, 0.14, 0.07, 0x888888, -1.8, 0.07, 3.35);
box(0.07, 0.14, 0.07, 0x888888,  1.8, 0.07, 3.35);

// Almofada decorativa encostada
box(0.5, 0.6, 0.12, 0xe8c87a, -1.7, 0.65, 3.0);

// ===================== MESA DE CENTRO =====================
// Tampo de vidro (azul claro translúcido)
const tableTopGeo = new THREE.BoxGeometry(1.6, 0.06, 0.9);
const tableTopMat = new THREE.MeshLambertMaterial({ color: 0xb8d4e8, transparent: true, opacity: 0.7 });
const tableTop = new THREE.Mesh(tableTopGeo, tableTopMat);
tableTop.position.set(0, 0.56, 1.5);
scene.add(tableTop);
// Pernas de metal dourado
box(0.05, 0.5, 0.05, 0xc8a060, -0.7, 0.28, 1.1);
box(0.05, 0.5, 0.05, 0xc8a060,  0.7, 0.28, 1.1);
box(0.05, 0.5, 0.05, 0xc8a060, -0.7, 0.28, 1.9);
box(0.05, 0.5, 0.05, 0xc8a060,  0.7, 0.28, 1.9);
// Revista na mesa
box(0.5, 0.02, 0.35, 0xe63946, -0.3, 0.6, 1.5);
box(0.4, 0.025, 0.28, 0xffffff, -0.3, 0.613, 1.5);
// Copo d'água
const copoGeo = new THREE.CylinderGeometry(0.055, 0.045, 0.18, 8);
const copoMat = new THREE.MeshLambertMaterial({ color: 0xaaddff, transparent: true, opacity: 0.6 });
const copo = new THREE.Mesh(copoGeo, copoMat);
copo.position.set(0.45, 0.68, 1.45);
scene.add(copo);

// ===================== PLANTA GRANDE (canto) =====================
// Vaso terracota
const vasoGeo = new THREE.CylinderGeometry(0.22, 0.16, 0.4, 8);
const vasoMat = new THREE.MeshLambertMaterial({ color: 0xc0603a });
const vaso = new THREE.Mesh(vasoGeo, vasoMat);
vaso.position.set(-5.5, 0.2, -1.5);
scene.add(vaso);
// Terra
const terraGeo = new THREE.CylinderGeometry(0.21, 0.21, 0.06, 8);
const terraMat = new THREE.MeshLambertMaterial({ color: 0x4a3020 });
const terra = new THREE.Mesh(terraGeo, terraMat);
terra.position.set(-5.5, 0.42, -1.5);
scene.add(terra);
// Caule
box(0.06, 1.4, 0.06, 0x3a6a20, -5.5, 1.1, -1.5);
// Folhas grandes (monstera simplificada)
const leafMat = new THREE.MeshLambertMaterial({ color: 0x2d8a3a, side: THREE.DoubleSide });
[-0.3, 0, 0.3].forEach((ox, i) => {
  const lGeo = new THREE.BoxGeometry(0.7, 0.5, 0.04);
  const leaf = new THREE.Mesh(lGeo, leafMat);
  leaf.position.set(-5.5 + ox, 1.7 + i * 0.15, -1.4);
  leaf.rotation.z = (i - 1) * 0.4;
  leaf.rotation.y = (i - 1) * 0.3;
  leaf.castShadow = true;
  scene.add(leaf);
});

// ===================== ANIMAÇÃO =====================
let alertActive = false;
let curtainProgress = 0;
let acProgress = 0;
let particles = [];

// Partículas de frio do AC
function createColdParticle() {
  const geo = new THREE.SphereGeometry(0.03, 4, 4);
  const mat = new THREE.MeshLambertMaterial({ color: 0x88ddff, transparent: true, opacity: 0.9 });
  const p = new THREE.Mesh(geo, mat);
  p.position.set(2.0 + (Math.random() - 0.5) * 2.0, 5.25, -4.55);
  p.userData = { vy: -0.012, vx: (Math.random()-0.5)*0.01, life: 1.0 };
  scene.add(p);
  particles.push(p);
}

let frameCount = 0;
let cameraShake = 0;

function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  const t = frameCount * 0.003;
  camera.position.x = Math.sin(t * 0.7) * 0.12;
  camera.position.y = 2.2 + Math.sin(t) * 0.04;

  if (cameraShake > 0) {
    camera.position.x += (Math.random() - 0.5) * cameraShake * 0.1;
    camera.position.y += (Math.random() - 0.5) * cameraShake * 0.05;
    cameraShake *= 0.92;
  }

  camera.lookAt(0, 2.0, 0);

  if (alertActive) {
    // Fechar cortinas — expandem em direção ao centro da janela
    if (curtainProgress < 1) {
      curtainProgress = Math.min(1, curtainProgress + 0.005);
      const ease = curtainProgress < 0.5
        ? 2 * curtainProgress * curtainProgress
        : -1 + (4 - 2 * curtainProgress) * curtainProgress;

      // Cortina esquerda: vai de x=-4.7 até x=-2.8, escala X de 1 até 4
      curtainL.position.x = -4.7 + ease * 1.9;
      curtainL.scale.x = 1 + ease * 3.5;

      // Cortina direita: vai de x=-0.3 até x=-2.2, espelhado
      curtainR.position.x = -0.3 - ease * 1.9;
      curtainR.scale.x = 1 + ease * 3.5;
    }

    // Ligar AC
    if (acProgress < 1) {
      acProgress = Math.min(1, acProgress + 0.006);
      acLight.intensity = acProgress * 1.5;
      acLedMat.color.setHex(acProgress > 0.5 ? 0x00ff88 : 0xff2200);
      acLedMat.emissive.setHex(acProgress > 0.5 ? 0x004422 : 0x440000);
      ambientLight.color.lerp(new THREE.Color(0xddeeff), 0.01);
    }

    // Partículas de frio
    if (acProgress > 0.5 && frameCount % 4 === 0) {
      createColdParticle();
    }
  }

  // Atualizar partículas
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.position.y += p.userData.vy;
    p.position.x += p.userData.vx;
    p.userData.life -= 0.012;
    p.material.opacity = p.userData.life * 0.9;
    if (p.userData.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
    }
  }

  // Piscar LED do AC quando ligando
  if (acProgress > 0 && acProgress < 0.5) {
    acLedMat.emissive.setScalar(Math.sin(frameCount * 0.2) * 0.3);
  }

  renderer.render(scene, camera);
}

animate();

// ===================== LÓGICA DE ALERTA =====================
function triggerAlert(temp, umid) {
  if (alertActive) return;
  alertActive = true;
  cameraShake = 1.5;

  // Atualizar displays
  document.getElementById('temp-big').innerHTML = temp.toFixed(1) + '<span id="temp-unit">°C</span>';
  document.getElementById('temp-big').classList.add('hot');
  document.getElementById('umid-val').textContent = umid + '%';
  document.getElementById('alert-temp').innerHTML = temp.toFixed(1) + '<span>°C</span>';

  // Badge de status
  const badge = document.getElementById('status-badge');
  badge.className = 'alert';
  document.getElementById('status-text').textContent = 'ALERTA ATIVO';

  // Overlay
  document.getElementById('alert-overlay').classList.add('visible');

  // Painel de alerta
  setTimeout(() => {
    document.getElementById('alert-panel').classList.add('visible');
  }, 300);

  // Cards de ação com delay


  setTimeout(() => {
    const winCard = document.getElementById('win-card');
    winCard.classList.add('active');
    document.getElementById('win-status').textContent = 'Fechando...';
    setTimeout(() => {
      document.getElementById('win-status').textContent = 'Fechadas ✓';
    }, 3000);
  }, 1500);

  setTimeout(() => {
    const acCard = document.getElementById('ac-card');
    acCard.classList.add('active');
    document.getElementById('ac-status').textContent = 'Ligando...';
    setTimeout(() => {
      document.getElementById('ac-status').textContent = 'Ligado ✓';
    }, 4000);
  }, 2500);
}

function resetAlert() {
  alertActive = false;
  curtainProgress = 0;
  acProgress = 0;
  curtainL.position.x = -4.7;
  curtainL.scale.x = 1;
  curtainR.position.x = -0.3;
  curtainR.scale.x = 1;
  acLight.intensity = 0;
  acLedMat.color.setHex(0xff2222);
  acLedMat.emissive.setHex(0x880000);
  ambientLight.color.set(0xfff5e0);
  particles.forEach(p => scene.remove(p));
  particles = [];

  document.getElementById('alert-panel').classList.remove('visible');
  document.getElementById('alert-overlay').classList.remove('visible');
  document.getElementById('status-badge').className = 'normal';
  document.getElementById('status-text').textContent = 'MONITORANDO';
  document.getElementById('temp-big').classList.remove('hot');
  ['ac-card','win-card'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('ac-status').textContent = 'Desligado';
  document.getElementById('win-status').textContent = 'Abertas';
}

// ===================== MQTT VIA WEBSOCKET =====================
// O broker HiveMQ tem suporte a WebSocket na porta 8000
// Para conectar via MQTT no browser, usamos a lib MQTT.js via CDN
// Descomente e configure quando tiver o broker pronto:

// MQTT via WebSocket
const mqttScript = document.createElement('script');
mqttScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js';
mqttScript.onload = () => {
  const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
    clientId: 'defesacivil_web_' + Math.random().toString(16).substr(2, 8)
  });

  client.on('connect', () => {
    console.log('MQTT conectado!');
    document.getElementById('status-badge').className = 'normal';
    document.getElementById('status-text').textContent = 'MONITORANDO';
    client.subscribe('estufa/Victoria/sensores');
    client.subscribe('estufa/Victoria/alertas');
  });

  client.on('message', (topic, message) => {
    try {
      const data = JSON.parse(message.toString());
      if (topic === 'estufa/Victoria/sensores') {
        // Atualiza temperatura e umidade em tempo real
        document.getElementById('temp-big').innerHTML =
          parseFloat(data.temperatura).toFixed(1) + '<span id="temp-unit">°C</span>';
        document.getElementById('umid-val').textContent = data.umidade + '%';

        // Dispara alerta se temperatura >= 40
        if (data.alerta && !alertActive) {
          triggerAlert(data.temperatura, data.umidade);
        }

        // Reset se voltou ao normal
        if (!data.alerta && alertActive) {
          resetAlert();
        }
      }
    } catch(e) { console.error('Erro MQTT:', e); }
  });

  client.on('error', (err) => console.error('MQTT erro:', err));
};
document.head.appendChild(mqttScript);

<!-- ===================== CHATBOT JS ===================== -->
<script>
(function() {
  const btn     = document.getElementById('chat-btn');
  const window_ = document.getElementById('chat-window');
  const msgs    = document.getElementById('chat-messages');
  const input   = document.getElementById('chat-input');
  const send    = document.getElementById('chat-send');
  let isOpen    = false;
  let isLoading = false;
  let chatHistory = [];

  const SYSTEM_PROMPT = `Você é o assistente virtual oficial da Defesa Civil Brasileira. Seu papel é orientar a população sobre ondas de calor, enchentes e deslizamentos. Responda de forma clara, direta e humana em no máximo 3 parágrafos curtos. Número de emergência da Defesa Civil: 199. Contexto: este é um sistema IoT que monitora temperatura em tempo real; quando passa de 40°C, alertas automáticos são enviados via WhatsApp para a população.`;

  const SUGGESTIONS = [
    "O que fazer no calor extremo?",
    "Quem são os grupos de risco?",
    "Como me preparar para enchentes?",
    "Qual o número da Defesa Civil?"
  ];

  let GEMINI_KEY = sessionStorage.getItem('gemini_key') || '';
  const API_URL = (key) => `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

  function askForKey() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;align-items:center;justify-content:center;';
    overlay.innerHTML = `
      <div style="background:#1a0a0a;border:1px solid rgba(230,57,70,0.4);border-radius:16px;padding:28px;width:300px;text-align:center;">
        <div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:2px;color:#e63946;margin-bottom:8px;">🛡️ DEFESA CIVIL</div>
        <div style="font-size:12px;color:#888;margin-bottom:16px;">Digite a chave de acesso para ativar o assistente</div>
        <input id="key-input" type="password" placeholder="Cole sua API Key aqui" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px;color:#fff;font-size:12px;outline:none;margin-bottom:12px;">
        <button id="key-btn" style="width:100%;background:#e63946;border:none;border-radius:8px;padding:10px;color:#fff;font-family:Inter,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">ATIVAR ASSISTENTE</button>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('key-btn').onclick = () => {
      const val = document.getElementById('key-input').value.trim();
      if (!val) return;
      GEMINI_KEY = val;
      sessionStorage.setItem('gemini_key', val);
      overlay.remove();
      showWelcome();
    };
    document.getElementById('key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('key-btn').click();
    });
    setTimeout(() => document.getElementById('key-input').focus(), 100);
  }

  function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function addSuggestions() {
    const wrap = document.createElement('div');
    wrap.className = 'suggestions';
    SUGGESTIONS.forEach(s => {
      const b = document.createElement('button');
      b.className = 'suggestion-btn';
      b.textContent = s;
      b.onclick = () => { input.value = s; sendMessage(); };
      wrap.appendChild(b);
    });
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showWelcome() {
    if (!GEMINI_KEY) { askForKey(); return; }
    if (msgs.children.length === 0) {
      addMsg('Olá! Sou o assistente virtual da Defesa Civil. Como posso ajudar você hoje?', 'bot');
      addSuggestions();
    }
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    addMsg(text, 'user');
    chatHistory.push({ role: 'user', parts: [{ text }] });

    isLoading = true;
    send.disabled = true;
    const typing = addMsg('Analisando...', 'bot typing');

    try {
      const response = await fetch(API_URL(GEMINI_KEY), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: chatHistory,
          generationConfig: { maxOutputTokens: 500, temperature: 0.7 }
        })
      });

      const data = await response.json();

      if (!response.ok) {
        console.error('Gemini erro:', data.error);
        throw new Error(data.error?.message || 'Erro na API');
      }

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Não consegui processar sua dúvida.';
      typing.remove();
      addMsg(reply, 'bot');
      chatHistory.push({ role: 'model', parts: [{ text: reply }] });

    } catch(e) {
      console.error('Erro:', e);
      typing.remove();
      addMsg('Problema técnico. Tente novamente.', 'bot');
    } finally {
      isLoading = false;
      send.disabled = false;
      input.focus();
    }
  }

  btn.addEventListener('click', () => {
    isOpen = !isOpen;
    window_.classList.toggle('open', isOpen);
    if (isOpen) { showWelcome(); setTimeout(() => input.focus(), 300); }
  });

  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
})();
</script>
</body>
</html>
